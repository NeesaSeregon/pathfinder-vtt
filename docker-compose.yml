services:
  postgres:
    image: postgres:17-alpine
    container_name: pathfinder-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-pathfinder}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pathfinder}
      POSTGRES_DB: ${DB_NAME:-pathfinder}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-pathfinder} -d ${DB_NAME:-pathfinder}']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
