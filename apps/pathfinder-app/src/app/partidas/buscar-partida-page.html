<main class="pagina-estrecha">
  <section class="panel">
    <h1>Buscar partida</h1>
    <p class="partida__texto">
      Únete a la mesa de tu máster con un código de invitación o buscando la
      partida por su nombre.
    </p>
    <form class="partida__form">
      <label>
        Código o nombre de la partida
        <input type="text" name="busqueda" placeholder="p. ej. La corona carmesí" />
      </label>
      <button type="button" class="boton-primario" disabled>Buscar</button>
    </form>
    <p class="aviso-construccion">
      Las partidas están en construcción: esta pantalla es una maqueta y la
      búsqueda aún no funciona.
    </p>
  </section>
</main>
