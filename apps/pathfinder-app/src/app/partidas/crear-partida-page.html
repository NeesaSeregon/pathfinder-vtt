<main class="pagina-estrecha">
  <section class="panel">
    <h1>Crear partida</h1>
    <p class="partida__texto">
      Prepara una mesa como máster: dale nombre a la partida e invita a tus
      jugadores con sus fichas.
    </p>
    <form class="partida__form">
      <label>
        Nombre de la partida
        <input type="text" name="nombre" placeholder="p. ej. El auge de los señores de las runas" />
      </label>
      <button type="button" class="boton-primario" disabled>Crear partida</button>
    </form>
    <p class="aviso-construccion">
      Las partidas están en construcción: esta pantalla es una maqueta y la
      creación aún no funciona.
    </p>
  </section>
</main>
