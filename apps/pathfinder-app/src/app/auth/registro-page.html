<main class="pagina-estrecha">
  <section class="panel">
    <h1>Crear cuenta</h1>
    <form class="acceso__form">
      <label>
        Nombre de usuario
        <input type="text" name="usuario" autocomplete="username" />
      </label>
      <label>
        Correo electrónico
        <input type="email" name="email" autocomplete="email" />
      </label>
      <label>
        Contraseña
        <input type="password" name="password" autocomplete="new-password" />
      </label>
      <label>
        Repite la contraseña
        <input type="password" name="password2" autocomplete="new-password" />
      </label>
      <button type="button" class="boton-primario" disabled>Crear cuenta</button>
    </form>
    <p class="aviso-construccion">
      El sistema de cuentas está en construcción: esta pantalla es una maqueta
      y el registro todavía no funciona.
    </p>
    <p class="acceso__alternativa">
      ¿Ya tienes cuenta?
      <a routerLink="/entrar">Inicia sesión</a>
    </p>
  </section>
</main>
