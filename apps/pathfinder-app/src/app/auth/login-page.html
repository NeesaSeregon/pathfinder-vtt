<main class="pagina-estrecha">
  <section class="panel">
    <h1>Iniciar sesión</h1>
    <form class="acceso__form">
      <label>
        Correo electrónico
        <input type="email" name="email" autocomplete="email" />
      </label>
      <label>
        Contraseña
        <input type="password" name="password" autocomplete="current-password" />
      </label>
      <button type="button" class="boton-primario" disabled>Entrar</button>
    </form>
    <p class="aviso-construccion">
      El sistema de cuentas está en construcción: esta pantalla es una maqueta
      y todavía no se puede iniciar sesión.
    </p>
    <p class="acceso__alternativa">
      ¿Aún no tienes cuenta?
      <a routerLink="/registro">Regístrate</a>
    </p>
  </section>
</main>
